services:
  - type: web
    name: job-tracker-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemma-4-31b-it:free,nvidia/nemotron-3-super-120b-a12b:free,openai/gpt-oss-20b:free,nvidia/nemotron-3-nano-30b-a3b:free,nvidia/nemotron-nano-9b-v2:free
      - key: OPENROUTER_FALLBACK_MODEL
        value: nvidia/nemotron-3-ultra-550b-a55b:free
      - key: AGENT_MAX_STEPS
        value: "10"
      - key: CLIENT_URL
        sync: false
